<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Learnchive - Game Arsip Interaktif</title>
    <style>
        :root {
            --bg-color: #FFD966;
            --primary-blue: #2C3E50;
            --accent-green: #27ae60;
        }

        body {
            background-color: var(--bg-color);
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
            height: 100vh;
        }

        header {
            text-align: center;
            color: var(--primary-blue);
        }

        .logo {
            font-size: 2rem;
            font-weight: bold;
            color: #433878;
        }

        /* Grid Utama */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(2, 120px);
            grid-template-rows: repeat(3, 150px);
            gap: 15px;
            padding: 15px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 15px;
        }

        .slot {
            background: rgba(255, 255, 255, 0.4);
            border: 2px dashed var(--primary-blue);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .slot.correct {
            border: 2px solid var(--accent-green);
            background: #f0fff4;
        }

        /* Horizontal Scroll Inventory */
        .inventory-wrapper {
            width: 100%;
            background: rgba(0, 0, 0, 0.05);
            padding: 20px 0;
            margin-top: 20px;
        }

        .inventory {
            display: flex;
            overflow-x: auto;
            gap: 8px;
            padding: 0 10px;
            scroll-snap-type: x mandatory;
            -webkit-overflow-scrolling: touch;
        }

        .inventory::-webkit-scrollbar {
            height: 6px;
        }

        .inventory::-webkit-scrollbar-thumb {
            background: var(--primary-blue);
            border-radius: 10px;
        }

        /* Card Style */
        .card {
            flex: 0 0 70px;
            height: 100px;
            background: black;
            border-radius: 8px;
            cursor: grab;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
            font-size: 0.8rem;
            text-align: center;
            scroll-snap-align: start;
            position: relative;
        }

        .card b {
            margin-bottom: 5px;
            pointer-events: none;
        }

        /* Zoom Button */
        .zoom-btn {
            position: absolute;
            top: 2px;
            right: 2px;
            background: var(--primary-blue);
            color: white;
            border: none;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            font-size: 10px;
        }

        /* Modal Zoom & Win */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            color: white;
            flex-direction: column;
        }

        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 15px;
            text-align: center;
            color: black;
            max-width: 80%;
        }

        #zoom-img-content {
            background: transparent;
            padding: 20px;
            border-radius: 10px;
            color: white;
            width: 80%;
            max-width: 400px;
            text-align: center;
        }

        .close-zoom {
            margin-top: 15px;
            padding: 10px 20px;
            cursor: pointer;
        }

        .in-slot {
            flex: 1;
            width: 100%;
            height: 100%;
            box-shadow: none;
        }

        .card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            /* penting: biar rapi */
            border-radius: 5px;
        }
    </style>
</head>

<body>

    <header>
        <div class="logo">Learnchive</div>
        <h5>Silahkan urutkan posisi surat tersebut agar menghasilkan lembar surat masuk yang benar Jadi di urutkan
            sesuai pengurutan pada sistem abjad </h5>
    </header>

    <div class="grid-container" id="main-grid">
        <div class="slot" data-index="0"></div>
        <div class="slot" data-index="1"></div>
        <div class="slot" data-index="2"></div>
        <div class="slot" data-index="3"></div>
        <div class="slot" data-index="4"></div>
        <div class="slot" data-index="5"></div>
    </div>

    <div class="inventory-wrapper">
        <div class="inventory" id="inventory">
            <div class="card" draggable="true" id="c0" data-order="0">
                <img src="img/surat/Cover Surat Masuk PT Dhufanra Group.jpg" alt="">
                <button class="zoom-btn">🔍</button>
            </div>
            <div class="card" draggable="true" id="c1" data-order="1">
                <img src="img/surat/1. Daftar Klasifikasi.jpg" alt="">
                <button class="zoom-btn">🔍</button>
            </div>
            <div class="card" draggable="true" id="c2" data-order="2">
                <img src="img/surat/Surat Masuk_Surat Penawaran (Semi Block Style)_page-0001.jpg" alt="">
                <button class="zoom-btn">🔍</button>
            </div>
            <div class="card" draggable="true" id="c3" data-order="3">
                <img src="img/surat/Daftar Indeks_page-0001.jpg.jpeg" alt="">
                <button class="zoom-btn">🔍</button>
            </div>
            <div class="card" draggable="true" id="c4" data-order="4">
                <img src="img/surat/Daftar Klasifikasi Wilayah_page-0001.jpg" alt="">
                <button class="zoom-btn">🔍</button>
            </div>
            <div class="card" draggable="true" id="c5" data-order="5">
                <img src="img/surat/Undangan_Umum.jpg" alt="">
                <button class="zoom-btn">🔍</button>
            </div>
        </div>
    </div>

    <div id="zoom-modal" class="modal">
        <div id="zoom-img-content">
            <h2 id="zoom-title">Detail Surat</h2>
            <div
                style="height: 500px; display: flex; align-items: center; justify-content: center; margin-bottom: 10px;">
                <img id="zoom-img" src="" style="max-width:100%; max-height:100%; object-fit: contain;">
            </div>
            <button class="close-zoom" onclick="closeZoom()">Tutup</button>
        </div>
    </div>

    <div id="win-modal" class="modal">
        <div class="modal-content">
            <h1>🎉 Selamat! 🎉</h1>
            <p>Susunan surat kamu sudah benar.</p>
            <button onclick="location.reload()">Main Lagi</button>
        </div>
    </div>

    <script>
        const cards = document.querySelectorAll('.card');
        const slots = document.querySelectorAll('.slot');
        const inventory = document.getElementById('inventory');
        let draggedCard = null;

        // Acak kartu
        function shuffle() {
            const arr = Array.from(cards);
            arr.sort(() => Math.random() - 0.5);
            arr.forEach(c => inventory.appendChild(c));
        }
        shuffle();

        // Drag & Drop
        cards.forEach(card => {
            card.addEventListener('dragstart', function () {
                draggedCard = this;
                this.style.opacity = '0.4';
            });
            card.addEventListener('dragend', function () {
                draggedCard.style.opacity = '1';
                draggedCard = null;
            });

            // Fitur Klik Zoom
            card.querySelector('.zoom-btn').addEventListener('click', (e) => {
                e.stopPropagation();
                const img = card.querySelector('img');
                openZoom(card.querySelector('b')?.innerText || 'Detail Surat', img?.src);
            });
        });

        slots.forEach(slot => {
            slot.addEventListener('dragover', e => e.preventDefault());
            slot.addEventListener('drop', function () {
                const targetIdx = this.getAttribute('data-index');
                const cardOrder = draggedCard.getAttribute('data-order');

                if (cardOrder === targetIdx) {
                    this.appendChild(draggedCard);
                    this.classList.add('correct');
                    draggedCard.setAttribute('draggable', 'false');
                    draggedCard.classList.add('in-slot');
                    draggedCard.querySelector('.zoom-btn').style.display = 'none';
                    checkWin();
                } else {
                    // Jika salah, kartu otomatis kembali ke inventory tanpa alert
                    inventory.appendChild(draggedCard);
                }
            });
        });

        function openZoom(title) {
            document.getElementById('zoom-title').innerText = title;
            document.getElementById('zoom-modal').style.display = 'flex';
        }

        function closeZoom() {
            document.getElementById('zoom-modal').style.display = 'none';
        }

        function checkWin() {
            if (document.querySelectorAll('.slot.correct').length === 6) {
                setTimeout(() => {
                    document.getElementById('win-modal').style.display = 'flex';
                }, 500);
            }
        }

        function openZoom(title, imgSrc) {
            document.getElementById('zoom-title').innerText = title;
            document.getElementById('zoom-img').src = imgSrc;
            document.getElementById('zoom-modal').style.display = 'flex';
        }
    </script>
</body>

</html>
