<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Learnchive Quiz</title>
    <style>
        :root {
            --bg-color: #AF4061;
            --header-color: #8e7aa1;
            --card-color: #e6cc8e;
            --option-color: #ffaa2b;
            --yellow-light: #eef296;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: white;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 360px;
            background-color: var(--bg-color);
            display: flex;
            flex-direction: column;
            padding: 20px;
            box-sizing: border-box;
            position: relative;
            height: 100vh;
        }

        /* Header Style */
        header {
            display: flex;
            align-items: center;
            background-color: var(--header-color);
            margin: -20px -20px 20px -20px;
            padding: 10px 20px;
            color: white;
            font-weight: bold;
        }

        .back-icon {
            font-size: 24px;
            margin-right: 15px;
            cursor: pointer;
        }

        /* Quiz UI Elements */
        .q-number {
            background-color: var(--yellow-light);
            width: 45px;
            height: 45px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: 800;
            font-size: 1.2rem;
            margin-bottom: 15px;
        }

        .question-card {
            background-color: var(--card-color);
            padding: 25px;
            border-radius: 30px;
            text-align: center;
            font-weight: 700;
            font-size: 1.1rem;
            margin-bottom: 30px;
            min-height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .options-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
            align-items: center;
        }

        .btn-option {
            background-color: var(--option-color);
            border: none;
            padding: 15px 25px;
            border-radius: 100%;
            font-weight: 800;
            font-size: 1rem;
            text-align: left;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            height: 100px;
            width: 100px;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .btn-option.correct {
            background-color: #4CAF50 !important;
            color: white;
        }

        .btn-option.wrong {
            background-color: #f44336 !important;
            color: white;
        }

        .btn-next {
            background-color: var(--yellow-light);
            border: none;
            padding: 12px 40px;
            border-radius: 5px;
            font-weight: 800;
            font-size: 1rem;
            cursor: pointer;
            visibility: hidden;
            margin: 30px auto;
            display: block;
        }

        /* --- Score Page Styles --- */
        #score-page {
            display: none;
            text-align: center;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
        }

        .logo-box {
            background: white;
            padding: 10px 40px;
            border-radius: 40px;
            margin-bottom: 30px;
        }

        .logo-box h2 {
            color: #5a2d82;
            margin: 0;
            font-style: italic;
        }

        .congrats-img {
            width: 250px;
            margin-bottom: 30px;
        }

        .result-row {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 15px;
            width: 100%;
            justify-content: center;
        }

        .result-label {
            background: white;
            padding: 10px 30px;
            border-radius: 30px;
            font-weight: 900;
            width: 100px;
        }

        .label-benar {
            color: #2ecc71;
        }

        .label-salah {
            color: #e74c3c;
        }

        .result-value {
            background: white;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: 900;
            font-size: 1.2rem;
            color: #2ecc71;
        }

        .val-salah {
            color: #e74c3c;
        }

        .btn-finish {
            background: white;
            border: none;
            padding: 15px 60px;
            border-radius: 40px;
            font-weight: 900;
            font-size: 1.1rem;
            margin-top: 50px;
            cursor: pointer;
        }

        .logo {
            margin-bottom: 20px;
        }

        .teks-pilgan {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            font-weight: bold;
        }
    </style>
</head>

        let currentIdx = 0;
        let scoreBenar = 0;
        let scoreSalah = 0;

        function initQuiz() {
            const data = quizData[currentIdx];
            document.getElementById('q-number').innerText = data.num + ".";
            document.getElementById('question-text').innerText = data.q;
            document.getElementById('next-btn').style.visibility = 'hidden';

            // Cek jika soal terakhir
            if (currentIdx === quizData.length - 1) {
                document.getElementById('next-btn').innerText = "SELESAI";
            }

            const container = document.getElementById('options-container');
            container.innerHTML = '';

            data.options.forEach((opt, index) => {
                const btn = document.createElement('button');
                btn.className = 'btn-option';
                btn.innerHTML = `<span>${opt}</span><span class="status-icon"></span>`;
                btn.onclick = () => checkAnswer(btn, index);
                container.appendChild(btn);
            });
        }

        function checkAnswer(selectedBtn, idx) {
            const correctIdx = quizData[currentIdx].answer;
            const allButtons = document.querySelectorAll('.btn-option');

            allButtons.forEach(btn => btn.style.pointerEvents = 'none');

            if (idx === correctIdx) {
                selectedBtn.classList.add('correct');
                selectedBtn.querySelector('.status-icon').innerText = '✔';
                scoreBenar++;
            } else {
                selectedBtn.classList.add('wrong');
                selectedBtn.querySelector('.status-icon').innerText = '✖';
                allButtons[correctIdx].classList.add('correct');
                allButtons[correctIdx].querySelector('.status-icon').innerText = '✔';
                scoreSalah++;
            }

            document.getElementById('next-btn').style.visibility = 'visible';
        }

        function handleNext() {
            if (currentIdx < quizData.length - 1) {
                currentIdx++;
                initQuiz();
            } else {
                showResults();
            }
        }

        function showResults() {
            document.getElementById('quiz-section').style.display = 'none';
            document.getElementById('score-page').style.display = 'flex';
            document.getElementById('final-benar').innerText = scoreBenar;
            document.getElementById('final-salah').innerText = scoreSalah;
        }

        initQuiz();
    </script>
