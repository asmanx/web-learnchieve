<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Learnchive Quiz</title>
    <style>
        :root {
            --bg-color: #6B890F;
            --header-color: #900B09;
            --card-color: #F3FEA5;
            --option-color: #F8BC18;
            --yellow-light: #eef296;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: white;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 360px;
            background-color: var(--bg-color);
            display: flex;
            flex-direction: column;
            padding: 20px;
            box-sizing: border-box;
            position: relative;
            height: 100vh;
        }

        /* Header Style */
        header {
            display: flex;
            align-items: center;
            background-color: var(--header-color);
            margin: -20px -20px 20px -20px;
            padding: 10px 20px;
            color: white;
            font-weight: bold;
        }

        .back-icon {
            font-size: 24px;
            margin-right: 15px;
            cursor: pointer;
        }

        /* Quiz UI Elements */
        .q-number {
            background-color: var(--yellow-light);
            width: 45px;
            height: 45px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: 800;
            font-size: 1.2rem;
            margin-bottom: 15px;
        }

        .question-card {
            background-color: var(--card-color);
            padding: 25px;
            border-radius: 30px;
            text-align: center;
            font-weight: 700;
            font-size: 1.1rem;
            margin-bottom: 30px;
            min-height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .options-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
            align-items: center;
            
        }

        .btn-option {
            background-color: var(--option-color);
            border: none;
            padding: 15px 25px;
            border-radius: 100%;
            font-weight: 800;
            font-size: 1rem;
            text-align: left;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            height: 100px;
            width: 150px;
            align-items: center;
            justify-content: center;
        
        }


        .btn-option.correct {
            background-color: #4CAF50 !important;
            color: white;
        }

        .btn-option.wrong {
            background-color: #f44336 !important;
            color: white;
        }

        .btn-next {
            background-color: var(--yellow-light);
            border: none;
            padding: 12px 40px;
            border-radius: 5px;
            font-weight: 800;
            font-size: 1rem;
            cursor: pointer;
            visibility: hidden;
            margin: 30px auto;
            display: block;
        }

        /* --- Score Page Styles --- */
        #score-page {
            display: none;
            text-align: center;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
        }

        .logo-box {
            background: white;
            padding: 10px 40px;
            border-radius: 40px;
            margin-bottom: 30px;
        }

        .logo-box h2 {
            color: #5a2d82;
            margin: 0;
            font-style: italic;
        }

        .congrats-img {
            width: 250px;
            margin-bottom: 30px;
        }

        .result-row {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 15px;
            width: 100%;
            justify-content: center;
        }

        .result-label {
            background: white;
            padding: 10px 30px;
            border-radius: 30px;
            font-weight: 900;
            width: 100px;
        }

        .label-benar {
            color: #2ecc71;
        }

        .label-salah {
            color: #e74c3c;
        }

        .result-value {
            background: white;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: 900;
            font-size: 1.2rem;
            color: #2ecc71;
        }

        .val-salah {
            color: #e74c3c;
        }

        .btn-finish {
            background: white;
            border: none;
            padding: 15px 60px;
            border-radius: 40px;
            font-weight: 900;
            font-size: 1.1rem;
            margin-top: 50px;
            cursor: pointer;
        }

        .logo {
            margin-bottom: 20px;
        }

        .teks-pilgan {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            font-weight: bold;
        }
    </style>
</head>

<body>

    <div class="container">
        <div id="quiz-section">
            <header>
                <div class="back-icon"><img src="img/elemen/back-button.png" alt=""></div>
                <div class="teks-pilgan">PILIHAN GANDA</div>
            </header>

            <div class="q-number" id="q-number">1.</div>
            <div class="question-card" id="question-text">Memuat soal...</div>
            <div class="options-list" id="options-container"></div>
            <button class="btn-next" id="next-btn" onclick="handleNext()">Soal Berikutnya</button>
        </div>

        <div id="score-page">
            <div>
                <img class="logo" src="img/game-pilgan/logo.png" alt="">
            </div>

            <div class="congrats-img">
                <img src="img/game-pilgan/congrats.png" alt="">
            </div>

            <div class="result-row">
                <div class="result-label label-benar">BENAR</div>
                <div class="result-value val-benar" id="final-benar">0</div>
            </div>

            <div class="result-row">
                <div class="result-label label-salah">SALAH</div>
                <div class="result-value val-salah" id="final-salah">0</div>
            </div>

           <a href="CoverBenarSalah.html"><button class="btn-finish">SELESAI</button></a>
           
        </div>
    </div>

    <script>
        const quizData = [
            {
                num: 1,
                q: "Jika sebuah perusahaan menyimpan dokumen transaksi tahun 2020 yang sudah jarang dibuka namun dilarang dibuang karena alasan pajak, maka dokumen tersebut dikategorikan sebagai Arsip Aktif.",
                options: ["Benar", "Salah"],
                answer: 1 // c
            },
            {
                num: 2,
                q: "Karakteristik Lengkap pada arsip berarti dokumen tersebut tidak boleh memiliki bagian yang hilang dan informasinya harus sesuai dengan fakta/kejadian aslinya.",
                options: ["Benar", "Salah"],
                answer: 0 // B
            },
            {
                num: 3,
                q: "Menurut Sir Hillary Jenkinson, arsip bukan sekadar kertas lama, melainkan dokumen yang dipelihara oleh orang yang bertanggung jawab atas transaksi tersebut atau penggantinya yang sah.",
                options: ["Benar", "Salah"],
                answer: 0 // D
            },
            {
                num: 4,
                q: "Pada Asas Desentralisasi, setiap unit kerja memiliki standar prosedur (SOP) penyimpanan yang pasti sama persis satu sama lain karena dikelola secara mandiri.",
                options: ["Benar", "Salah"],
                answer: 1 // C
            },
            {
                num: 5,
                q: "Nilai Guna Yuridis sebuah arsip hanya berlaku saat dokumen tersebut masih dalam tahap “Arsip Aktif”, dan akan hilang saat menjadi “Arsip Inaktif”.",
                options: ["Benar", "Salah"],
                answer: 1 // c
            },
            {
                num: 6,
                q: "Kelemahan utama dari Asas Sentralisasi adalah risiko terjadinya duplikasi (penggandaan) dokumen yang sangat tinggi karena semua unit kerja menyimpan salinannya.",
                options: ["Benar", "Salah"],
                answer: 1 // B
            },
            {
                num: 7,
                q: "Dalam Sistem Subjek, arsip surat dari “PT. Maju Mundur” dan “PT. Terang Jaya” bisa saja disimpan dalam satu laci yang sama jika keduanya membahas tentang masalah yang sama (misal: Penawaran Harga).",
                options: ["Benar", "Salah"],
                answer: 0 // D
            },
            {
                num: 8,
                q: "Jika sebuah kantor cabang di Surabaya mengirimkan laporan bulanan ke kantor pusat di Jakarta, maka kantor pusat akan mengarsipkan laporan tersebut menggunakan Sistem Klasifikasi Wilayah dengan folder “Jakarta”.",
                options: ["Benar", "Salah"],
                answer: 1 // C
            },
            {
                num: 9,
                q: "Sistem Numerik dianggap lebih sulit bagi pemula karena petugas harus melihat buku indeks atau kode klasifikasi terlebih dahulu sebelum bisa menemukan dokumennya.",
                options: ["Benar", "Salah"],
                answer: 0 // c
            },
            {
                num: 10,
                q: "Arsip yang memiliki nilai sejarah (seperti naskah Proklamasi) tidak boleh dimusnahkan dalam tahap Penyusutan Arsip, melainkan harus dipindahkan menjadi Arsip Statis.",
                options: ["Benar", "Salah"],
                answer: 0 // B
            },
    
        ];

        let currentIdx = 0;
        let scoreBenar = 0;
        let scoreSalah = 0;

        function initQuiz() {
            const data = quizData[currentIdx];
            document.getElementById('q-number').innerText = data.num + ".";
            document.getElementById('question-text').innerText = data.q;
            document.getElementById('next-btn').style.visibility = 'hidden';

            // Cek jika soal terakhir
            if (currentIdx === quizData.length - 1) {
                document.getElementById('next-btn').innerText = "SELESAI";
            }

            const container = document.getElementById('options-container');
            container.innerHTML = '';

            data.options.forEach((opt, index) => {
                const btn = document.createElement('button');
                btn.className = 'btn-option';
                btn.innerHTML = `<span>${opt}</span><span class="status-icon"></span>`;
                btn.onclick = () => checkAnswer(btn, index);
                container.appendChild(btn);
            });
        }

        function checkAnswer(selectedBtn, idx) {
            const correctIdx = quizData[currentIdx].answer;
            const allButtons = document.querySelectorAll('.btn-option');

            allButtons.forEach(btn => btn.style.pointerEvents = 'none');

            if (idx === correctIdx) {
                selectedBtn.classList.add('correct');
                selectedBtn.querySelector('.status-icon').innerText = '✔';
                scoreBenar++;
            } else {
                selectedBtn.classList.add('wrong');
                selectedBtn.querySelector('.status-icon').innerText = '✖';
                allButtons[correctIdx].classList.add('correct');
                allButtons[correctIdx].querySelector('.status-icon').innerText = '✔';
                scoreSalah++;
            }

            document.getElementById('next-btn').style.visibility = 'visible';
        }

        function handleNext() {
            if (currentIdx < quizData.length - 1) {
                currentIdx++;
                initQuiz();
            } else {
                showResults();
            }
        }

        function showResults() {
            document.getElementById('quiz-section').style.display = 'none';
            document.getElementById('score-page').style.display = 'flex';
            document.getElementById('final-benar').innerText = scoreBenar;
            document.getElementById('final-salah').innerText = scoreSalah;
        }

        initQuiz();
    </script>

</body>

</html>
