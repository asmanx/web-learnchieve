<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Learnchive - Game Arsip Interaktif</title>
    <style>
        :root {
            --bg-color: #FFD966;
            --primary-blue: #2C3E50;
            --accent-green: #27ae60;
        }

        body {
            background-color: var(--bg-color);
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow: hidden; /* Mengunci scroll agar pas satu layar */
            height: 100vh;
        }

        header { text-align: center; color: var(--primary-blue); height: 12vh; padding: 5px; box-sizing: border-box;}
        .logo { font-size: 1.5rem; font-weight: bold; color: #433878; margin: 0;}
        header h5 { font-size: 0.7rem; margin: 5px 10px; line-height: 1.2; }

        /* Grid Utama */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            grid-template-rows: repeat(3, 1fr);
            gap: 10px;
            width: 90%;
            height: 55vh;
            padding: 10px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 15px;
            box-sizing: border-box;
        }

        .slot {
            background: rgba(255, 255, 255, 0.4);
            border: 2px dashed var(--primary-blue);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        .slot.correct { border: 2px solid var(--accent-green); background: #f0fff4; }

        /* Inventory */
        .inventory-wrapper {
            width: 100%;
            height: 30vh;
            background: rgba(0,0,0,0.05);
            display: flex;
            align-items: center;
        }

        .inventory {
            display: flex;
            overflow-x: auto;
            gap: 10px;
            padding: 0 15px;
            height: 90%;
            align-items: center;
            -webkit-overflow-scrolling: touch;
        }

        /* Card Style */
        .card {
            flex: 0 0 100px;
            height: 140px;
            background: white;
            border-radius: 8px;
            cursor: grab;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
            position: relative;
            touch-action: none;
        }

        /* Ukuran gambar di dalam kartu */
        .card img {
            width: 90%;
            height: 70%;
            object-fit: contain;
            pointer-events: none;
        }

        .card b { font-size: 0.6rem; margin-top: 5px; pointer-events: none; }

        .zoom-btn {
            position: absolute;
            top: 2px;
            right: 2px;
            background: var(--primary-blue);
            color: white;
            border: none;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            font-size: 12px;
            z-index: 5;
        }

        /* Modal Zoom */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }

        #zoom-img-content {
            background: white;
            padding: 15px;
            border-radius: 10px;
            width: 85%;
            max-width: 400px;
            text-align: center;
        }

        #img-display {
            width: 100%;
            max-height: 60vh;
            object-fit: contain;
            margin: 10px 0;
        }

        .close-zoom { padding: 10px 20px; cursor: pointer; background: var(--primary-blue); color: white; border: none; border-radius: 5px;}

        .in-slot { width: 100% !important; height: 100% !important; flex: none !important; box-shadow: none; border-radius: 0; }
    </style>
</head>
<body>

    <header>
        <div class="logo">Learnchive</div>
        <h5>Urutkan surat berdasarkan sistem abjad untuk menghasilkan lembar surat masuk yang benar.</h5>
    </header>

    <div class="grid-container" id="main-grid">
        <div class="slot" data-index="0"></div>
        <div class="slot" data-index="1"></div>
        <div class="slot" data-index="2"></div>
        <div class="slot" data-index="3"></div>
        <div class="slot" data-index="4"></div>
        <div class="slot" data-index="5"></div>
    </div>

    <div class="inventory-wrapper">
        <div class="inventory" id="inventory">
            <div class="card" draggable="true" id="c0" data-order="0">
                <img src="cover.png" alt="cover">
                <b>Cover</b>
                <button class="zoom-btn">🔍</button>
            </div>
            <div class="card" draggable="true" id="c1" data-order="1">
                <img src="img/surat/Cover Surat Masuk PT Dhufanra Group.png" alt="indeks">
                <b>Cover</b>
                <button class="zoom-btn">🔍</button>
            </div>
            <div class="card" draggable="true" id="c2" data-order="2">
                <img src="surat1.png" alt="surat1">
                <b>Surat Masuk 1</b>
                <button class="zoom-btn">🔍</button>
            </div>
            <div class="card" draggable="true" id="c3" data-order="3">
                <img src="surat2.png" alt="surat2">
                <b>Surat Masuk 2</b>
                <button class="zoom-btn">🔍</button>
            </div>
            <div class="card" draggable="true" id="c4" data-order="4">
                <img src="surat3.png" alt="surat3">
                <b>Surat Masuk 3</b>
                <button class="zoom-btn">🔍</button>
            </div>
            <div class="card" draggable="true" id="c5" data-order="5">
                <img src="agenda.png" alt="agenda">
                <b>Agenda Terisi</b>
                <button class="zoom-btn">🔍</button>
            </div>
        </div>
    </div>

    <div id="zoom-modal" class="modal">
        <div id="zoom-img-content">
            <h2 id="zoom-title" style="margin:0; font-size: 1.2rem;">Detail Surat</h2>
            <img id="img-display" src="" alt="Zoomed">
            <button class="close-zoom" onclick="closeZoom()">Tutup</button>
        </div>
    </div>

    <div id="win-modal" class="modal">
        <div style="background:white; padding: 30px; border-radius: 15px; text-align: center;">
            <h1>🎉 Selamat! 🎉</h1>
            <p>Susunan surat kamu sudah benar.</p>
            <button class="close-zoom" onclick="location.reload()">Main Lagi</button>
        </div>
    </div>

    <script>
        const cards = document.querySelectorAll('.card');
        const slots = document.querySelectorAll('.slot');
        const inventory = document.getElementById('inventory');
        let draggedCard = null;

        function shuffle() {
            const arr = Array.from(cards);
            arr.sort(() => Math.random() - 0.5);
            arr.forEach(c => inventory.appendChild(c));
        }
        shuffle();

        cards.forEach(card => {
            card.addEventListener('dragstart', function() {
                draggedCard = this;
                this.style.opacity = '0.4';
            });
            card.addEventListener('dragend', function() {
                draggedCard.style.opacity = '1';
                draggedCard = null;
            });
            
            // Logika Klik Zoom
            card.querySelector('.zoom-btn').addEventListener('click', (e) => {
                e.stopPropagation();
                const imgSrc = card.querySelector('img').src; // Ambil src gambar
                const title = card.querySelector('b').innerText; // Ambil judul
                openZoom(title, imgSrc);
            });
        });

        slots.forEach(slot => {
            slot.addEventListener('dragover', e => e.preventDefault());
            slot.addEventListener('drop', function() {
                const targetIdx = this.getAttribute('data-index');
                const cardOrder = draggedCard.getAttribute('data-order');

                if (cardOrder === targetIdx) {
                    this.appendChild(draggedCard);
                    this.classList.add('correct');
                    draggedCard.setAttribute('draggable', 'false');
                    draggedCard.classList.add('in-slot');
                    draggedCard.querySelector('.zoom-btn').style.display = 'none';
                    checkWin();
                } else {
                    inventory.appendChild(draggedCard);
                }
            });
        });

        function openZoom(title, src) {
            document.getElementById('zoom-title').innerText = title;
            document.getElementById('img-display').src = src; // Pasang src gambar ke modal
            document.getElementById('zoom-modal').style.display = 'flex';
        }

        function closeZoom() {
            document.getElementById('zoom-modal').style.display = 'none';
        }

        function checkWin() {
            if (document.querySelectorAll('.slot.correct').length === 6) {
                setTimeout(() => {
                    document.getElementById('win-modal').style.display = 'flex';
                }, 500);
            }
        }
    </script>
</body>
</html>
